<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mica · Automate Coverage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #1C1E23;
  --sidebar: #15171C;
  --card: #23262E;
  --elevated: #2A2D36;
  --teal: #00A693;
  --amber: #E8894A;
  --blue: #4BA3C3;
  --deep-blue: #005389;
  --text: #C8CDD8;
  --muted: #9AA2B4;
  --border: rgba(192,192,192,0.08);
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* AUTH GATE */
.auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.auth-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px; }
.auth-card h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 6px; }
.auth-card p { color: var(--muted); font-size: 0.875rem; margin-bottom: 28px; line-height: 1.6; }
.auth-card label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.auth-card input { width: 100%; background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; outline: none; }
.auth-card input:focus { border-color: var(--teal); }
.auth-card button { margin-top: 16px; width: 100%; background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.auth-card button:hover { opacity: 0.85; }
.auth-error { margin-top: 12px; font-size: 0.8rem; color: #f87171; display: none; }

/* LAYOUT */
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 10; }
.main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
.topbar { position: sticky; top: 0; background: rgba(28,30,35,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; z-index: 5; }
.topbar h2 { font-size: 1rem; font-weight: 600; }
.content { padding: 28px; flex: 1; }

/* SIDEBAR */
.sidebar-logo { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo h1 { font-size: 0.95rem; font-weight: 700; color: var(--teal); }
.sidebar-logo p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.nav-section { padding: 12px 12px 8px; }
.nav-label { font-size: 0.68rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; color: var(--muted); transition: all 0.15s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: rgba(0,166,147,0.12); color: var(--teal); font-weight: 500; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* LIVE PILL */
.live-pill { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
@keyframes pillFlash { 0%,100%{background:transparent} 30%{background:rgba(0,166,147,0.15)} }

/* SUMMARY CARDS */
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
.card-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; font-weight: 500; }
.card-value { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 500; line-height: 1; }
.card-sub { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }
.card-value.teal { color: var(--teal); }
.card-value.amber { color: var(--amber); }
.card-value.blue { color: var(--blue); }
@keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
.card { animation: cardIn 0.4s ease both; }
.card:nth-child(1){animation-delay:0s} .card:nth-child(2){animation-delay:0.07s}
.card:nth-child(3){animation-delay:0.14s} .card:nth-child(4){animation-delay:0.21s}

/* PROGRESS BAR */
.progress-bar { height: 8px; background: var(--elevated); border-radius: 99px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

/* CHART SECTION */
.chart-section { display: grid; grid-template-columns: 340px 1fr; gap: 20px; margin-bottom: 28px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.chart-card h3 { font-size: 0.875rem; font-weight: 600; margin-bottom: 20px; }
.donut-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto; }
.donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.donut-pct { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 500; color: var(--teal); }
.donut-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.legend { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.legend-label { flex: 1; color: var(--muted); }
.legend-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

/* SUITE TABLE */
.table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.table-head h3 { font-size: 0.875rem; font-weight: 600; }
.search-input { background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 0.82rem; outline: none; width: 220px; }
.search-input:focus { border-color: var(--teal); }
.filter-tabs { display: flex; gap: 6px; }
.filter-tab { padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
.filter-tab.active, .filter-tab:hover { background: var(--elevated); color: var(--text); }
.filter-tab[data-filter="Automated"].active { background: rgba(0,166,147,0.15); color: var(--teal); border-color: rgba(0,166,147,0.3); }
.filter-tab[data-filter="To be Automated"].active { background: rgba(232,137,74,0.15); color: var(--amber); border-color: rgba(232,137,74,0.3); }
.filter-tab[data-filter="Manual"].active { background: rgba(75,163,195,0.15); color: var(--blue); border-color: rgba(75,163,195,0.3); }

table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
th { text-align: left; padding: 10px 16px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
th.sort-active .sort-arrow { opacity: 1; color: var(--teal); }
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; font-size: 0.72rem; font-weight: 500; white-space: nowrap; }
.badge.automated { background: rgba(0,166,147,0.15); color: var(--teal); }
.badge.to-be-automated { background: rgba(232,137,74,0.15); color: var(--amber); }
.badge.manual { background: rgba(75,163,195,0.15); color: var(--blue); }
.badge::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.tc-id { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }
.suite-tag { display: inline-block; background: var(--elevated); color: var(--muted); border-radius: 4px; padding: 2px 7px; font-size: 0.72rem; }

/* PAGINATION */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); }
.pagination-btns { display: flex; gap: 4px; align-items: center; }
.pg-btn { background: var(--elevated); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 0.78rem; }
.pg-btn:hover { border-color: var(--teal); color: var(--teal); }
.pg-btn:disabled { opacity: 0.3; cursor: default; }
.page-size-select { background: var(--elevated); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 0.78rem; }

/* SUITE BREAKDOWN */
.suite-row td:first-child { font-weight: 500; }
.mini-stacked { display: flex; height: 6px; border-radius: 99px; overflow: hidden; gap: 1px; min-width: 120px; }
.mini-seg { height: 100%; transition: width 0.6s ease; }

/* UTILITY */
.hidden { display: none !important; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); gap: 10px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 16px 20px; color: #fca5a5; font-size: 0.85rem; margin-bottom: 20px; }

@media (max-width:1023px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: none; }
  .main { margin-left: 0; }
  .cards-grid { grid-template-columns: repeat(2,1fr); }
  .chart-section { grid-template-columns: 1fr; }
}
@media (max-width:640px) {
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .content { padding: 16px; }
}
</style>
</head>
<body>
  <div id="auth-gate" class="auth-wrap">
  <div class="auth-card">
    <h1>Mica · Automate Coverage</h1>
    <p>Enter your Qase API token to load automation coverage data for NDLP Plan 5. Your token is saved in this browser only.</p>
    <label for="token-input">Qase API Token</label>
    <input type="password" id="token-input" placeholder="api-token-xxxxxxxxxxxx" autocomplete="off">
    <button id="token-submit">Connect to Qase →</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>
  <div id="app" class="hidden"></div>
  <script type="module">
const AUTH_KEY = 'qase_token_mica'

function getSavedToken() {
  return localStorage.getItem(AUTH_KEY) || ''
}

async function validateToken(token) {
  const res = await fetch('https://api.qase.io/v1/project/NDLP', {
    headers: { 'Token': token, 'Accept': 'application/json' }
  })
  if (!res.ok) throw new Error(`HTTP ${res.status}`)
  const data = await res.json()
  if (!data.status) throw new Error('Invalid token or no access to NDLP')
}

async function initAuth() {
  const saved = getSavedToken()
  if (saved) {
    try {
      await validateToken(saved)
      showApp(saved)
      return
    } catch (_) {
      localStorage.removeItem(AUTH_KEY)
    }
  }
  document.getElementById('auth-gate').classList.remove('hidden')
  document.getElementById('token-submit').addEventListener('click', async () => {
    const token = document.getElementById('token-input').value.trim()
    const errEl = document.getElementById('auth-error')
    errEl.style.display = 'none'
    if (!token) { errEl.textContent = 'Please enter your API token.'; errEl.style.display = 'block'; return }
    const btn = document.getElementById('token-submit')
    btn.textContent = 'Connecting…'; btn.disabled = true
    try {
      await validateToken(token)
      localStorage.setItem(AUTH_KEY, token)
      document.getElementById('auth-gate').classList.add('hidden')
      showApp(token)
    } catch (e) {
      errEl.textContent = `Connection failed: ${e.message}. Check your token and try again.`
      errEl.style.display = 'block'
      btn.textContent = 'Connect to Qase →'; btn.disabled = false
    }
  })
}

// ── TASK 4: Qase API Module ──────────────────────────────────────────────────

const QASE_BASE = 'https://api.qase.io/v1'
const PROJECT = 'NDLP'
const PLAN_ID = 5
const AUTOMATION_FIELD = 'Automation Status'
const STATUS_VALUES = ['Automated', 'To be Automated', 'Manual']

async function qaseFetch(path, token) {
  const res = await fetch(`${QASE_BASE}${path}`, {
    headers: { 'Token': token, 'Accept': 'application/json' }
  })
  if (!res.ok) throw new Error(`Qase API error ${res.status}: ${path}`)
  return res.json()
}

async function fetchPlanCaseIds(token) {
  const data = await qaseFetch(`/plan/${PROJECT}/${PLAN_ID}`, token)
  if (!data.status || !data.result) throw new Error('Failed to fetch plan')
  return new Set(data.result.cases.map(c => c.case_id))
}

async function fetchAllCases(token) {
  const limit = 100
  let offset = 0
  let all = []
  while (true) {
    const data = await qaseFetch(`/case/${PROJECT}?limit=${limit}&offset=${offset}`, token)
    if (!data.status || !data.result) break
    all = all.concat(data.result.entities)
    if (all.length >= data.result.total || data.result.entities.length < limit) break
    offset += limit
  }
  return all
}

function extractAutomationStatus(tc) {
  if (!tc.custom_fields) return 'Manual'
  const field = tc.custom_fields.find(f => f.name === AUTOMATION_FIELD)
  if (!field || !field.value) return 'Manual'
  const raw = String(field.value).split(',')[0].trim()
  const match = STATUS_VALUES.find(s => s.toLowerCase() === raw.toLowerCase())
  return match || 'Manual'
}

async function loadData(token) {
  const [caseIds, allCases] = await Promise.all([
    fetchPlanCaseIds(token),
    fetchAllCases(token)
  ])
  const planCases = allCases.filter(tc => caseIds.has(tc.id))
  return planCases.map(tc => ({
    id: tc.id,
    title: tc.title,
    suite: tc.suite_title || 'Uncategorized',
    priority: tc.priority,
    automationStatus: extractAutomationStatus(tc),
    link: `https://app.qase.io/case/${PROJECT}-${tc.id}`
  }))
}

function computeStats(cases) {
  const total = cases.length
  const counts = { Automated: 0, 'To be Automated': 0, Manual: 0 }
  cases.forEach(c => { counts[c.automationStatus] = (counts[c.automationStatus] || 0) + 1 })
  const automatedPct = total > 0 ? Math.round((counts.Automated / total) * 100) : 0
  const suites = {}
  cases.forEach(c => {
    if (!suites[c.suite]) suites[c.suite] = { Automated: 0, 'To be Automated': 0, Manual: 0, total: 0 }
    suites[c.suite][c.automationStatus]++
    suites[c.suite].total++
  })
  return { total, counts, automatedPct, suites }
}

// placeholder — Tasks 5–8 will add showApp and render functions
function showApp(token) {
  console.log('showApp called, token validated. Tasks 5–8 will implement rendering.')
}

initAuth()
</script>
</body>
</html>
