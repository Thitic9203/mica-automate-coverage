  <style>
/* ── Tokens ── */
:root {
  --chrome:        #E2E2E0;
  --chrome-border: #CACAC8;
  --page:          #F0F0EE;
  --card:          #F8F8F7;
  --card-border:   #E0E0DE;
  --teal:          #2E6B4F;
  --green:         #3E7A5E;
  --green-v:       #62A88A;
  --amber:         #8A6020;
  --amber-v:       #C4913A;
  --blue:          #3A6080;
  --blue-v:        #6899B8;
  --text:          #1C1C1C;
  --muted:         #5E5E5E;
  --border:        #E0E0DE;
  --radius:        8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--page);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }

/* ── Auth gate ── */
#auth-gate {
  position: fixed; inset: 0; z-index: 9999;
  display: none; align-items: center; justify-content: center;
  background: var(--page);
}
.auth-box {
  background: #FFFFFF;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 48px 44px;
  text-align: center;
  max-width: 400px; width: 90%;
  box-shadow: 0 4px 32px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  animation: authIn .4s cubic-bezier(.22,1,.36,1) backwards;
}
@keyframes authIn { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }
.auth-logo {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(62,122,94,0.07);
  border: 1px solid rgba(62,122,94,0.18);
  color: var(--teal);
  font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 99px;
  margin-bottom: 20px; letter-spacing: .07em;
}
.auth-logo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); }
.auth-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.022em; }
.auth-box p { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.65; }
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 11px;
  border: 1px solid var(--card-border); border-radius: 8px;
  background: #FFFFFF; font-size: 14px; font-weight: 500; color: var(--text);
  cursor: pointer; transition: background .12s, border-color .12s;
  font-family: inherit;
}
.btn-google:hover { background: #F7F7F5; border-color: #C4C4C0; }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.auth-error {
  font-size: 12px; color: #991B1B; margin-top: 12px; display: none;
  background: rgba(153,27,27,0.05); border: 1px solid rgba(153,27,27,0.15);
  border-radius: 6px; padding: 8px 12px;
}
.auth-note { font-size: 11px; color: var(--muted); margin-top: 16px; opacity: 0.5; }

/* ══════════════════════════════════════════
   BROWSER CHROME + TAB STRIP
══════════════════════════════════════════ */
.browser-chrome {
  background: var(--chrome);
  position: sticky; top: 0; z-index: 100;
  /* bottom border drawn by tab-bar so active tab can override it */
}

.tab-bar {
  display: flex;
  align-items: flex-end;
  padding: 8px 0 0 0;
  border-bottom: 1px solid var(--chrome-border);
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
}
.tab-bar::-webkit-scrollbar { display: none; }

/* App identity left of tabs */
.chrome-brand {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px 9px 14px;
  flex-shrink: 0;
  border-right: 1px solid var(--chrome-border);
  margin-right: 4px;
}
.chrome-brand-icon {
  width: 16px; height: 16px; border-radius: 4px;
  background: var(--teal);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chrome-brand-icon svg { width: 10px; height: 10px; }
.chrome-brand-name {
  font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: -.01em;
  white-space: nowrap;
}

/* Individual tab */
.tab {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  color: #666;
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  transition: background .1s, color .1s;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 148px;
  position: relative;
  /* active tab uses margin-bottom trick to overlap chrome-border */
  margin-bottom: 0;
}
.tab:hover { background: rgba(255,255,255,0.45); color: var(--text); }
.tab.active {
  background: var(--page);
  border-color: var(--chrome-border);
  border-bottom-color: var(--page); /* "erases" chrome border under active tab */
  color: var(--text);
  font-weight: 600;
  margin-bottom: -1px;
  padding-bottom: 8px;
}
.tab-icon { flex-shrink: 0; }
.tab-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.tab-x {
  width: 16px; height: 16px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #999; line-height: 1;
  opacity: 0; transition: opacity .1s, background .1s;
  flex-shrink: 0; font-style: normal;
}
.tab:hover .tab-x,
.tab.active .tab-x { opacity: 1; }
.tab-x:hover { background: rgba(0,0,0,0.1); color: var(--text); }

/* Right side: live status + sign out */
.tab-spacer { flex: 1; min-width: 8px; }
.chrome-meta {
  display: flex; align-items: center; gap: 14px;
  padding: 0 14px 9px 8px;
  flex-shrink: 0;
}
.live-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted); white-space: nowrap;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #62A88A; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes pillFlash { 0%,100%{background:transparent} 30%{background:rgba(62,122,94,0.06)} }
.signout-btn {
  font-size: 11px; color: var(--muted); cursor: pointer;
  border: none; background: none; padding: 3px 8px;
  border-radius: 5px; font-family: inherit;
  transition: background .1s, color .1s;
}
.signout-btn:hover { background: rgba(0,0,0,0.06); color: var(--text); }

/* ══════════════════════════════════════════
   PAGE CONTENT
══════════════════════════════════════════ */
.page-content {
  padding: 40px 48px 72px;
}
.page-header { margin-bottom: 36px; }
.page-title {
  font-size: 34px; font-weight: 700;
  letter-spacing: -.034em; color: var(--text);
  margin-bottom: 6px; line-height: 1.1;
}
.page-meta {
  display: flex; align-items: center; gap: 10px;
}
.page-eyebrow {
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: .08em; text-transform: uppercase;
}
.page-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); opacity: .5; }

/* ── Summary Cards ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 20px 22px;
  animation: cardIn 0.3s ease both;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:0.06s}
.card:nth-child(3){animation-delay:0.12s}
.card:nth-child(4){animation-delay:0.18s}
.env-table { width:100%; margin-top:12px; border-collapse:collapse; }
.env-table td { padding:3px 0; font-size:12px; border-bottom:none; vertical-align:top; color:var(--text); }
.env-k { color:var(--muted); white-space:nowrap; padding-right:12px; width:56px; font-size:11px; padding-top:4px; }
.env-v { font-family:'JetBrains Mono',monospace; font-size:11px; word-break:break-all; line-height:1.5; }
.roles-table { width:100%; border-collapse:collapse; margin-top:4px; table-layout:fixed; }
.roles-table th { cursor:default; font-size:10px; padding:6px 10px; position:static; }
.roles-table th:first-child { width:100px; }
.roles-table td { padding:6px 10px; font-size:12px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text); overflow:hidden; }
.roles-table tr:last-child td { border-bottom:none; }
.roles-table td:first-child { white-space:nowrap; font-weight:500; width:80px; }
.roles-table td:last-child { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:10px; word-break:break-all; }
@keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.card-label {
  font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 10px; font-weight: 500;
}
.card-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem; font-weight: 500; line-height: 1; color: var(--text);
}
.card-sub { font-size: 12px; color: var(--muted); margin-top: 7px; }
.card-value.teal  { color: var(--green); }
.card-value.amber { color: var(--amber); }
.card-value.blue  { color: var(--blue); }

/* ── Progress bar ── */
.progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

/* ── Chart section ── */
.chart-section {
  display: grid;
  grid-template-columns: 290px 1fr 420px;
  gap: 10px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 22px;
}
.chart-card h3 {
  font-size: 13px; font-weight: 600;
  margin-bottom: 18px; color: var(--text); letter-spacing: -.01em;
}
.donut-wrap { position: relative; width: 240px; height: 240px; margin: 0 auto; }
.donut-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.donut-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem; font-weight: 500; color: var(--green);
}
.donut-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.legend { display: flex; flex-direction: column; gap: 9px; margin-top: 18px; }
.legend-item { display: flex; align-items: center; gap: 9px; font-size: 13px; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.legend-label { flex: 1; color: var(--muted); }
.legend-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 13px; }

/* ── Table ── */
.table-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  overflow: clip;
}
.page-table th { top: 44px; }
.table-head {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.table-head h3 { font-size: 13px; font-weight: 600; color: var(--text); }
.search-input {
  background: #FFFFFF; border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px;
  color: var(--text); font-size: 13px; outline: none;
  width: 220px; transition: border-color .12s, box-shadow .12s;
  font-family: inherit;
}
.search-input:focus {
  border-color: rgba(62,122,94,0.32);
  box-shadow: 0 0 0 3px rgba(62,122,94,0.07);
}
.search-input::placeholder { color: var(--muted); }
.filter-tabs { display: flex; gap: 4px; }
.filter-tab {
  padding: 5px 10px; border-radius: 5px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border);
  background: #FFFFFF; color: var(--muted);
  transition: all 0.1s; font-family: inherit;
}
.filter-tab:hover { background: #EEEEED; color: var(--text); }
.filter-tab.active { background: #E8E8E6; color: var(--text); border-color: #C8C8C4; }
.filter-tab[data-filter="Automated"].active     { background: rgba(62,122,94,0.11); color: var(--green); border-color: rgba(62,122,94,0.28); }
.filter-tab[data-filter="To be Automated"].active { background: rgba(138,96,32,0.11); color: var(--amber); border-color: rgba(138,96,32,0.28); }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  position: sticky; top: 0; z-index: 10;
  text-align: left; padding: 9px 16px;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted); font-weight: 600;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
  background: var(--card-border);
}
#table-body-wrap {
  max-height: calc(100vh - 230px);
  overflow-y: auto;
  scrollbar-width: none;
}
#table-body-wrap::-webkit-scrollbar { display: none; }
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 10px; }
th.sort-active .sort-arrow { opacity: 1; color: var(--teal); }
td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle; color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(0,0,0,0.013); }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 500; white-space: nowrap;
}
.badge::before { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.badge.automated      { background: rgba(62,122,94,0.11);  color: var(--green); }
.badge.to-be-automated{ background: rgba(138,96,32,0.11);  color: var(--amber); }
.badge.manual         { background: rgba(58,96,128,0.10);  color: var(--blue); }
.tc-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
.suite-tag {
  display: inline-block;
  background: rgba(0,0,0,0.04); color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px; font-size: 11px;
}

/* ── Pagination ── */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.pagination-btns { display: flex; gap: 4px; align-items: center; }
.pg-btn {
  background: #FFFFFF; border: 1px solid var(--border);
  color: var(--text); border-radius: 5px; padding: 4px 10px;
  cursor: pointer; font-size: 12px; font-family: inherit;
  transition: border-color .1s, color .1s;
}
.pg-btn:hover { border-color: var(--teal); color: var(--teal); }
.pg-btn:disabled { opacity: 0.3; cursor: default; }
.page-size-select {
  background: #FFFFFF; border: 1px solid var(--border);
  color: var(--text); border-radius: 5px; padding: 3px 8px;
  font-size: 12px; font-family: inherit;
}

/* ── Suite breakdown bars ── */
.suite-row td:first-child { font-weight: 500; }
.suite-prog-wrap { display:flex; align-items:center; gap:10px; }
.suite-prog-bar { flex:1; height:6px; background:var(--border); border-radius:99px; overflow:hidden; min-width:80px; position:relative; }
.suite-prog-fill { height:100%; border-radius:99px; background:#62A88A; transition:width 0.8s ease; }
.suite-prog-fill::after { content:''; position:absolute; right:0; top:0; width:4px; height:100%; background:#6899B8; border-radius:99px; }

/* ── Utility ── */
.hidden { display: none !important; }
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--muted); gap: 10px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(0,0,0,0.07);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.error-msg {
  background: rgba(153,27,27,0.04);
  border: 1px solid rgba(153,27,27,0.14);
  border-radius: 6px; padding: 14px 18px;
  color: #991B1B; font-size: 13px; margin-bottom: 20px;
}

/* ── Responsive ── */
@media (max-width: 1023px) {
  .page-content { padding: 28px 20px 48px; }
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-section { grid-template-columns: 1fr; }
  .tab { min-width: 120px; }
}
@media (max-width: 640px) {
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .page-title { font-size: 26px; }
  .tab { min-width: 100px; padding: 6px 10px; }
  .tab-label { font-size: 12px; }
  .page-content { padding: 20px 16px 40px; }
}
  </style>
</head>
<body>

<!-- ── Auth gate ── -->
<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-logo"><span class="auth-logo-dot"></span>MICA · QA</div>
    <h2>Mica Automation Coverage</h2>
    <p>สำหรับทีม Pluton เท่านั้น</p>
    <button class="btn-google" id="btnGoogle">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span>Sign in with Google</span>
    </button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── Main app ── -->
<div id="app" class="hidden">

  <!-- Browser chrome + tab strip -->
  <div class="browser-chrome">
    <div class="tab-bar">

      <!-- Brand mark -->
      <div class="chrome-brand">
        <div class="chrome-brand-icon">
          <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 1.2A3.8 3.8 0 1 1 1.74 7" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M3 5l1.5 1.5L7.5 3" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="chrome-brand-name">Mica</span>
      </div>

      <!-- Tabs -->
      <div class="tab active" data-view="overview">
        <!-- bar chart: ascending bars = coverage analytics -->
        <svg class="tab-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" style="color:#2E6B4F">

const QASE_BASE = '/api/qase'
const QASE_TOKEN = '50c6e3fb93f0d51bd387d50d91f2282b1cec3d9aab0c44f4b64c4cf02b02e71f'
const PROJECT = 'Mica'
const PLAN_ID = 5
const STATUS_VALUES = ['Automated', 'To be Automated', 'Manual']

async function qaseFetch(path) {
  const res = await fetch(`${QASE_BASE}${path}`, {
    headers: { 'Token': QASE_TOKEN, 'Accept': 'application/json' }
  })
  if (!res.ok) throw new Error(`Qase API error ${res.status}: ${path}`)
  return res.json()
}

async function fetchPlanCaseIds() {
  const data = await qaseFetch(`/plan/${PROJECT}/${PLAN_ID}`)
  if (!data.status || !data.result) throw new Error('Failed to fetch plan')
  return new Set(data.result.cases.map(c => c.case_id))
}

async function fetchSuiteMap() {
  const map = {}
  let offset = 0
  while (true) {
    const data = await qaseFetch(`/suite/${PROJECT}?limit=100&offset=${offset}`)
    if (!data.status || !data.result) break
    data.result.entities.forEach(s => { map[s.id] = s.title })
    if (data.result.entities.length < 100) break
    offset += 100
  }
  return map
}

async function fetchFieldOptions() {
  try {
    const data = await qaseFetch(`/custom_field/97`)
    if (!data.status || !data.result || !data.result.value) return {}
    const options = JSON.parse(data.result.value)
    const map = {}
    options.forEach(o => { map[String(o.id)] = o.title })
    return map
  } catch { return {} }
}

async function fetchAllCases() {
  const all = []
  let offset = 0
  while (true) {
    const data = await qaseFetch(`/case/${PROJECT}?limit=100&offset=${offset}`)
    if (!data.status || !data.result) break
    all.push(...data.result.entities)
    if (data.result.entities.length < 100) break
    offset += 100
  }
  return all
}

function extractAutomationStatus(tc, fieldOptions) {
  if (!tc.custom_fields || !tc.custom_fields.length) return 'Manual'
  const field = tc.custom_fields.find(f => String(f.id) === '97')
  if (!field || field.value == null || field.value === '') return 'Manual'
  const rawValues = Array.isArray(field.value)
    ? field.value
    : String(field.value).split(',')
  for (const raw of rawValues) {
    const r = raw.toString().trim()
    if (fieldOptions[r]) {
      const text = fieldOptions[r]
      const match = STATUS_VALUES.find(s => s.toLowerCase() === text.toLowerCase())
      if (match) return match
    }
    const textMatch = STATUS_VALUES.find(s => s.toLowerCase() === r.toLowerCase())
    if (textMatch) return textMatch
  }
  return 'Manual'
}

async function loadData() {
  const [caseIds, suiteMap, fieldOptions, allCases] = await Promise.all([
    fetchPlanCaseIds(),
    fetchSuiteMap(),
    fetchFieldOptions(),
    fetchAllCases()
  ])
  return allCases.filter(tc => caseIds.has(tc.id)).map(tc => ({
    id: tc.id,
    title: tc.title,
    suite: suiteMap[tc.suite_id] || 'Uncategorized',
    priority: tc.priority,
    automationStatus: extractAutomationStatus(tc, fieldOptions),
    link: `https://app.qase.io/case/${PROJECT}-${tc.id}`
  }))
}

function computeStats(cases) {
  const total = cases.length
  const counts = { Automated: 0, 'To be Automated': 0, Manual: 0 }
  cases.forEach(c => { counts[c.automationStatus] = (counts[c.automationStatus] || 0) + 1 })
  const automatedPct = total > 0 ? Math.round((counts.Automated / total) * 100) : 0
  const suites = {}
  cases.forEach(c => {
    if (!suites[c.suite]) suites[c.suite] = { Automated: 0, 'To be Automated': 0, Manual: 0, total: 0 }
    suites[c.suite][c.automationStatus]++
    suites[c.suite].total++
  })
  return { total, counts, automatedPct, suites }
}

        </div>
      </div>
      <div id="table-body-wrap"></div>
    </div>
  `
  document.getElementById('tc-search').addEventListener('input', e => {
    tableSearch = e.target.value; tablePage = 1; refreshTableBody()
  })
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      tableFilter = btn.dataset.filter; tablePage = 1; refreshTableBody()
    })
  })
  refreshTableBody()
}

function refreshTableBody() {
  let filtered = appData.filter(tc => {
    const matchFilter = tableFilter === 'All' || tc.automationStatus === tableFilter
    const q = tableSearch.toLowerCase()
    const matchSearch = !q || tc.title.toLowerCase().includes(q) || tc.suite.toLowerCase().includes(q)
    return matchFilter && matchSearch
  })
  filtered.sort((a, b) => {
    const dir = tableSort.dir === 'asc' ? 1 : -1
    if (tableSort.col === 'id')     return (a.id - b.id) * dir
    if (tableSort.col === 'title')  return a.title.localeCompare(b.title) * dir
    if (tableSort.col === 'suite')  return a.suite.localeCompare(b.suite) * dir
    if (tableSort.col === 'status') return a.automationStatus.localeCompare(b.automationStatus) * dir
    return 0
  })
  const total = filtered.length
  const start = (tablePage - 1) * tablePageSize
  const page = filtered.slice(start, start + tablePageSize)
  const totalPages = Math.max(1, Math.ceil(total / tablePageSize))

  const arrow = col => {
    if (tableSort.col !== col) return '<span class="sort-arrow">⇅</span>'
    return `<span class="sort-arrow">${tableSort.dir === 'asc' ? '↑' : '↓'}</span>`
  }
  const sortCls = col => tableSort.col === col ? ' sort-active' : ''

  const wrap = document.getElementById('table-body-wrap')
  if (!wrap) return
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th class="${sortCls('id')}" data-col="id">ID${arrow('id')}</th>
        <th class="${sortCls('title')}" data-col="title">Title${arrow('title')}</th>
        <th class="${sortCls('suite')}" data-col="suite">Suite${arrow('suite')}</th>
        <th class="${sortCls('status')}" data-col="status">Automation Status${arrow('status')}</th>
      </tr></thead>
      <tbody>
        ${page.length === 0
          ? `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--muted)">No test cases found</td></tr>`
          : page.map(tc => `<tr>
              <td>${qaseLoggedIn
                ? `<a class="tc-id" href="${tc.link}" target="_blank" style="color:var(--muted);text-decoration:none">Mica-${tc.id}</a>`
                : `<span class="tc-id">Mica-${tc.id}</span>`
              }</td>
              <td>${qaseLoggedIn
                ? `<a href="${tc.link}" target="_blank" style="color:var(--text);text-decoration:none">${tc.title}</a>`
                : `<span>${tc.title}</span>`
              }</td>
              <td><span class="suite-tag">${tc.suite}</span></td>
              <td>${statusBadge(tc.automationStatus)}</td>
            </tr>`).join('')
        }
      </tbody>
    </table>
    <div class="pagination">
      <span>${total} test case${total !== 1 ? 's' : ''} · Page ${tablePage} of ${totalPages}</span>
      <div class="pagination-btns">
        <select class="page-size-select" id="page-size">
          ${[10,20,50,100].map(n => `<option value="${n}"${tablePageSize===n?' selected':''}>${n}/page</option>`).join('')}
        </select>
        <button class="pg-btn" id="pg-prev" ${tablePage <= 1 ? 'disabled' : ''}>‹</button>
        <button class="pg-btn" id="pg-next" ${tablePage >= totalPages ? 'disabled' : ''}>›</button>
      </div>
    </div>
  `
  wrap.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col
      if (tableSort.col === col) tableSort.dir = tableSort.dir === 'asc' ? 'desc' : 'asc'
      else { tableSort.col = col; tableSort.dir = 'asc' }
      refreshTableBody()
    })
  })
  wrap.querySelector('#pg-prev')?.addEventListener('click', () => { tablePage--; refreshTableBody() })
  wrap.querySelector('#pg-next')?.addEventListener('click', () => { tablePage++; refreshTableBody() })
  wrap.querySelector('#page-size')?.addEventListener('change', e => {
    tablePageSize = Number(e.target.value); tablePage = 1; refreshTableBody()
  })
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === tableFilter)
  })
}
</script>
</body>
</html>
