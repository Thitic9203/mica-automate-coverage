<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mica · Automate Coverage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #1C1E23;
  --sidebar: #15171C;
  --card: #23262E;
  --elevated: #2A2D36;
  --teal: #00A693;
  --amber: #E8894A;
  --blue: #4BA3C3;
  --deep-blue: #005389;
  --text: #C8CDD8;
  --muted: #9AA2B4;
  --border: rgba(192,192,192,0.08);
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* AUTH GATE */
.auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.auth-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px; }
.auth-card h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 6px; }
.auth-card p { color: var(--muted); font-size: 0.875rem; margin-bottom: 28px; line-height: 1.6; }
.auth-card label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.auth-card input { width: 100%; background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; outline: none; }
.auth-card input:focus { border-color: var(--teal); }
.auth-card button { margin-top: 16px; width: 100%; background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.auth-card button:hover { opacity: 0.85; }
.auth-error { margin-top: 12px; font-size: 0.8rem; color: #f87171; display: none; }

/* LAYOUT */
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 10; }
.main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
.topbar { position: sticky; top: 0; background: rgba(28,30,35,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; z-index: 5; }
.topbar h2 { font-size: 1rem; font-weight: 600; }
.content { padding: 28px; flex: 1; }

/* SIDEBAR */
.sidebar-logo { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo h1 { font-size: 0.95rem; font-weight: 700; color: var(--teal); }
.sidebar-logo p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.nav-section { padding: 12px 12px 8px; }
.nav-label { font-size: 0.68rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; color: var(--muted); transition: all 0.15s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: rgba(0,166,147,0.12); color: var(--teal); font-weight: 500; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* LIVE PILL */
.live-pill { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
@keyframes pillFlash { 0%,100%{background:transparent} 30%{background:rgba(0,166,147,0.15)} }

/* SUMMARY CARDS */
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
.card-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; font-weight: 500; }
.card-value { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 500; line-height: 1; }
.card-sub { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }
.card-value.teal { color: var(--teal); }
.card-value.amber { color: var(--amber); }
.card-value.blue { color: var(--blue); }
@keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
.card { animation: cardIn 0.4s ease both; }
.card:nth-child(1){animation-delay:0s} .card:nth-child(2){animation-delay:0.07s}
.card:nth-child(3){animation-delay:0.14s} .card:nth-child(4){animation-delay:0.21s}

/* PROGRESS BAR */
.progress-bar { height: 8px; background: var(--elevated); border-radius: 99px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

/* CHART SECTION */
.chart-section { display: grid; grid-template-columns: 340px 1fr; gap: 20px; margin-bottom: 28px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.chart-card h3 { font-size: 0.875rem; font-weight: 600; margin-bottom: 20px; }
.donut-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto; }
.donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.donut-pct { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 500; color: var(--teal); }
.donut-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.legend { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.legend-label { flex: 1; color: var(--muted); }
.legend-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

/* SUITE TABLE */
.table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.table-head h3 { font-size: 0.875rem; font-weight: 600; }
.search-input { background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 0.82rem; outline: none; width: 220px; }
.search-input:focus { border-color: var(--teal); }
.filter-tabs { display: flex; gap: 6px; }
.filter-tab { padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
.filter-tab.active, .filter-tab:hover { background: var(--elevated); color: var(--text); }
.filter-tab[data-filter="Automated"].active { background: rgba(0,166,147,0.15); color: var(--teal); border-color: rgba(0,166,147,0.3); }
.filter-tab[data-filter="To be Automated"].active { background: rgba(232,137,74,0.15); color: var(--amber); border-color: rgba(232,137,74,0.3); }
.filter-tab[data-filter="Manual"].active { background: rgba(75,163,195,0.15); color: var(--blue); border-color: rgba(75,163,195,0.3); }

table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
th { text-align: left; padding: 10px 16px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
th.sort-active .sort-arrow { opacity: 1; color: var(--teal); }
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; font-size: 0.72rem; font-weight: 500; white-space: nowrap; }
.badge.automated { background: rgba(0,166,147,0.15); color: var(--teal); }
.badge.to-be-automated { background: rgba(232,137,74,0.15); color: var(--amber); }
.badge.manual { background: rgba(75,163,195,0.15); color: var(--blue); }
.badge::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.tc-id { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }
.suite-tag { display: inline-block; background: var(--elevated); color: var(--muted); border-radius: 4px; padding: 2px 7px; font-size: 0.72rem; }

/* PAGINATION */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); }
.pagination-btns { display: flex; gap: 4px; align-items: center; }
.pg-btn { background: var(--elevated); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 0.78rem; }
.pg-btn:hover { border-color: var(--teal); color: var(--teal); }
.pg-btn:disabled { opacity: 0.3; cursor: default; }
.page-size-select { background: var(--elevated); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 0.78rem; }

/* SUITE BREAKDOWN */
.suite-row td:first-child { font-weight: 500; }
.mini-stacked { display: flex; height: 6px; border-radius: 99px; overflow: hidden; gap: 1px; min-width: 120px; }
.mini-seg { height: 100%; transition: width 0.6s ease; }

/* UTILITY */
.hidden { display: none !important; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); gap: 10px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 16px 20px; color: #fca5a5; font-size: 0.85rem; margin-bottom: 20px; }

@media (max-width:1023px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: none; }
  .main { margin-left: 0; }
  .cards-grid { grid-template-columns: repeat(2,1fr); }
  .chart-section { grid-template-columns: 1fr; }
}
@media (max-width:640px) {
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .content { padding: 16px; }
}
</style>
</head>
<body>
  <div id="auth-gate" class="auth-wrap">
  <div class="auth-card">
    <h1>Mica · Automate Coverage</h1>
    <p>Enter your Qase API token to load automation coverage data for NDLP Plan 5. Your token is saved in this browser only.</p>
    <label for="token-input">Qase API Token</label>
    <input type="password" id="token-input" placeholder="api-token-xxxxxxxxxxxx" autocomplete="off">
    <button id="token-submit">Connect to Qase →</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>
  <div id="app" class="hidden">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <h1>Mica Coverage</h1>
        <p>NDLP · Plan 5</p>
      </div>
      <div class="nav-section">
        <div class="nav-label">Views</div>
        <div class="nav-item active" data-view="overview">
          <span class="nav-dot" style="background:var(--teal)"></span>
          Overview
        </div>
        <div class="nav-item" data-view="suites">
          <span class="nav-dot" style="background:var(--blue)"></span>
          By Suite
        </div>
        <div class="nav-item" data-view="table">
          <span class="nav-dot" style="background:var(--amber)"></span>
          All Test Cases
        </div>
      </div>
      <div class="nav-section" style="margin-top:auto;padding-bottom:16px">
        <div class="nav-item" id="logout-btn" style="cursor:pointer">
          <span>⎋</span> Disconnect
        </div>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button id="hamburger" style="display:none;background:none;border:none;color:var(--text);cursor:pointer;font-size:1.2rem">☰</button>
          <h2 id="view-title">Overview</h2>
        </div>
        <div class="live-pill" id="live-pill">
          <span class="live-dot"></span>
          <span id="last-updated">Loading…</span>
        </div>

</div>
  <script type="module">
import Chart from 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/auto/+esm'

const AUTH_KEY = 'qase_token_mica'

function getSavedToken() {
  return localStorage.getItem(AUTH_KEY) || ''
}

async function validateToken(token) {
  const res = await fetch('https://api.qase.io/v1/project/NDLP', {
    headers: { 'Token': token, 'Accept': 'application/json' }
  })
  if (!res.ok) throw new Error(`HTTP ${res.status}`)
  const data = await res.json()
  if (!data.status) throw new Error('Invalid token or no access to NDLP')
}

async function initAuth() {
  const saved = getSavedToken()
  if (saved) {
    try {
      await validateToken(saved)
      showApp(saved)
      return
    } catch (_) {
      localStorage.removeItem(AUTH_KEY)
    }
  }
  document.getElementById('auth-gate').classList.remove('hidden')
  document.getElementById('token-submit').addEventListener('click', async () => {
    const token = document.getElementById('token-input').value.trim()
    const errEl = document.getElementById('auth-error')
    errEl.style.display = 'none'
    if (!token) { errEl.textContent = 'Please enter your API token.'; errEl.style.display = 'block'; return }
    const btn = document.getElementById('token-submit')
    btn.textContent = 'Connecting…'; btn.disabled = true
    try {
      await validateToken(token)
      localStorage.setItem(AUTH_KEY, token)
      document.getElementById('auth-gate').classList.add('hidden')
      showApp(token)
    } catch (e) {
      errEl.textContent = `Connection failed: ${e.message}. Check your token and try again.`
      errEl.style.display = 'block'
      btn.textContent = 'Connect to Qase →'; btn.disabled = false
    }
  })
}

// ── TASK 4: Qase API Module ──────────────────────────────────────────────────

const QASE_BASE = 'https://api.qase.io/v1'
const PROJECT = 'NDLP'
const PLAN_ID = 5
const AUTOMATION_FIELD = 'Automation Status'
const STATUS_VALUES = ['Automated', 'To be Automated', 'Manual']

async function qaseFetch(path, token) {
  const res = await fetch(`${QASE_BASE}${path}`, {
    headers: { 'Token': token, 'Accept': 'application/json' }
  })
  if (!res.ok) throw new Error(`Qase API error ${res.status}: ${path}`)
  return res.json()
}

async function fetchPlanCaseIds(token) {
  const data = await qaseFetch(`/plan/${PROJECT}/${PLAN_ID}`, token)
  if (!data.status || !data.result) throw new Error('Failed to fetch plan')
  return new Set(data.result.cases.map(c => c.case_id))
}

async function fetchAllCases(token) {
  const limit = 100
  let offset = 0
  let all = []
  while (true) {
    const data = await qaseFetch(`/case/${PROJECT}?limit=${limit}&offset=${offset}`, token)
    if (!data.status || !data.result) break
    all = all.concat(data.result.entities)
    if (all.length >= data.result.total || data.result.entities.length < limit) break
    offset += limit
  }
  return all
}

function extractAutomationStatus(tc) {
  if (!tc.custom_fields) return 'Manual'
  const field = tc.custom_fields.find(f => f.name === AUTOMATION_FIELD)
  if (!field || !field.value) return 'Manual'
  const raw = String(field.value).split(',')[0].trim()
  const match = STATUS_VALUES.find(s => s.toLowerCase() === raw.toLowerCase())
  return match || 'Manual'
}

async function loadData(token) {
  const [caseIds, allCases] = await Promise.all([
    fetchPlanCaseIds(token),
    fetchAllCases(token)
  ])
  const planCases = allCases.filter(tc => caseIds.has(tc.id))
  return planCases.map(tc => ({
    id: tc.id,
    title: tc.title,
    suite: tc.suite_title || 'Uncategorized',
    priority: tc.priority,
    automationStatus: extractAutomationStatus(tc),
    link: `https://app.qase.io/case/${PROJECT}-${tc.id}`
  }))
}

function computeStats(cases) {
  const total = cases.length
  const counts = { Automated: 0, 'To be Automated': 0, Manual: 0 }
  cases.forEach(c => { counts[c.automationStatus] = (counts[c.automationStatus] || 0) + 1 })
  const automatedPct = total > 0 ? Math.round((counts.Automated / total) * 100) : 0
  const suites = {}
  cases.forEach(c => {
    if (!suites[c.suite]) suites[c.suite] = { Automated: 0, 'To be Automated': 0, Manual: 0, total: 0 }
    suites[c.suite][c.automationStatus]++
    suites[c.suite].total++
  })
  return { total, counts, automatedPct, suites }
}

let appToken = ''
let appData = []
let appStats = {}
let activeView = 'overview'
let tableFilter = 'All'
let tableSort = { col: 'id', dir: 'asc' }
let tableSearch = ''
let tablePage = 1
let tablePageSize = 20

function showApp(token) {
  appToken = token
  document.getElementById('app').classList.remove('hidden')
  setupNav()
  setupHamburger()
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem(AUTH_KEY)
    location.reload()
  })
  fetchAndRender()
  setInterval(fetchAndRender, 60 * 60 * 1000)
}

async function fetchAndRender() {
  try {
    appData = await loadData(appToken)
    appStats = computeStats(appData)
    document.getElementById('last-updated').textContent =
      `Updated ${new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`
    const pill = document.getElementById('live-pill')
    pill.style.animation = 'none'
    requestAnimationFrame(() => { pill.style.animation = 'pillFlash 1.5s ease' })
    renderView()
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">Failed to load data: ${e.message}</div>`
  }
}

function setupNav() {
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    el.addEventListener('click', () => {
      activeView = el.dataset.view
      document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.remove('active'))
      el.classList.add('active')
      const titles = { overview: 'Overview', suites: 'By Suite', table: 'All Test Cases' }
      document.getElementById('view-title').textContent = titles[activeView]
      document.getElementById('sidebar').classList.remove('open')
      renderView()
    })
  })
}

function setupHamburger() {
  const btn = document.getElementById('hamburger')
  if (window.innerWidth <= 1023) btn.style.display = 'block'
  window.addEventListener('resize', () => {
    btn.style.display = window.innerWidth <= 1023 ? 'block' : 'none'
  })
  btn.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open')
  })
}

function renderView() {
  if (activeView === 'overview') renderOverview()
  else if (activeView === 'suites') renderSuites()
  else renderTable()
}

function renderOverview() {
  const { total, counts, automatedPct } = appStats
  const content = document.getElementById('content')
  content.innerHTML = `
    <div class="cards-grid">
      <div class="card"><div class="card-label">Total TCs</div><div class="card-value">${total}</div><div class="card-sub">in NDLP Plan 5</div></div>
      <div class="card"><div class="card-label">Automated</div><div class="card-value teal">${counts.Automated}</div><div class="card-sub">${automatedPct}% of total</div></div>
      <div class="card"><div class="card-label">To be Automated</div><div class="card-value amber">${counts['To be Automated']}</div><div class="card-sub">${total > 0 ? Math.round(counts['To be Automated']/total*100) : 0}% of total</div></div>
      <div class="card"><div class="card-label">Manual</div><div class="card-value blue">${counts.Manual}</div><div class="card-sub">${total > 0 ? Math.round(counts.Manual/total*100) : 0}% of total</div></div>
    </div>
    <div class="chart-section">
      <div class="chart-card">
        <h3>Automation Coverage</h3>
        <div class="donut-wrap"><canvas id="donut-chart"></canvas><div class="donut-center"><span class="donut-pct">${automatedPct}%</span><span class="donut-lbl">Automated</span></div></div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:var(--teal)"></span><span class="legend-label">Automated</span><span class="legend-val teal">${counts.Automated}</span></div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span><span class="legend-label">To be Automated</span><span class="legend-val amber">${counts['To be Automated']}</span></div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span><span class="legend-label">Manual</span><span class="legend-val blue">${counts.Manual}</span></div>
        </div>
      </div>
      <div class="chart-card" id="suite-summary-card">
        <h3>Coverage by Suite</h3>
        <div id="suite-summary-content"></div>
      </div>
    </div>
  `
  renderDonut()
  renderSuiteSummary()
}

let donutChart = null

function renderDonut() {
  const { counts } = appStats
  const ctx = document.getElementById('donut-chart')
  if (!ctx) return
  if (donutChart) { donutChart.destroy(); donutChart = null }
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Automated', 'To be Automated', 'Manual'],
      datasets: [{
        data: [counts.Automated, counts['To be Automated'], counts.Manual],
        backgroundColor: ['#00A693', '#E8894A', '#4BA3C3'],
        borderWidth: 0,
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '70%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0)
              const pct = total > 0 ? Math.round(ctx.parsed / total * 100) : 0
              return ` ${ctx.label}: ${ctx.parsed} (${pct}%)`
            }
          }
        }
      },
      animation: { animateScale: true, duration: 600 }
    }
  })
}

function renderSuiteSummary() {
  const { suites } = appStats
  const container = document.getElementById('suite-summary-content')
  if (!container) return
  const entries = Object.entries(suites).sort((a, b) => b[1].total - a[1].total)
  if (entries.length === 0) { container.innerHTML = '<p style="color:var(--muted);font-size:0.82rem">No suites found.</p>'; return }
  container.innerHTML = `
    <table style="width:100%">
      <thead><tr>
        <th style="text-align:left;padding:6px 0;font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)">Suite</th>
        <th style="text-align:right;padding:6px 8px;font-size:0.72rem;color:var(--muted);border-bottom:1px solid var(--border)">Coverage</th>
        <th style="padding:6px 0 6px 8px;border-bottom:1px solid var(--border);min-width:100px"></th>
      </tr></thead>
      <tbody>
        ${entries.map(([suite, s]) => {
          const pct = s.total > 0 ? Math.round(s.Automated / s.total * 100) : 0
          const aPct = (s.Automated / s.total * 100).toFixed(1)
          const tPct = (s['To be Automated'] / s.total * 100).toFixed(1)
          const mPct = (s.Manual / s.total * 100).toFixed(1)
          return `<tr>
            <td style="padding:9px 0;font-size:0.82rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${suite}">${suite}</td>
            <td style="text-align:right;padding:9px 8px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--teal)">${pct}%</td>
            <td style="padding:9px 0 9px 8px">
              <div class="mini-stacked">
                <div class="mini-seg" style="background:var(--teal);width:${aPct}%"></div>
                <div class="mini-seg" style="background:var(--amber);width:${tPct}%"></div>
                <div class="mini-seg" style="background:var(--blue);width:${mPct}%"></div>
              </div>
            </td>
          </tr>`
        }).join('')}
      </tbody>
    </table>
  `
}

function renderSuites() {
  const { suites, counts } = appStats
  const entries = Object.entries(suites).sort((a, b) => b[1].total - a[1].total)
  const content = document.getElementById('content')
  content.innerHTML = `
    <div class="cards-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="card"><div class="card-label">Total Suites</div><div class="card-value">${entries.length}</div></div>
      <div class="card"><div class="card-label">Automated TCs</div><div class="card-value teal">${counts.Automated}</div><div class="card-sub">across all suites</div></div>
      <div class="card"><div class="card-label">Automation Rate</div><div class="card-value teal">${appStats.automatedPct}%</div></div>
    </div>
    <div class="table-card">
      <div class="table-head"><h3>Suite Breakdown</h3></div>
      <table>
        <thead><tr>
          <th>Suite</th>
          <th>Total TCs</th>
          <th style="color:var(--teal)">Automated</th>
          <th style="color:var(--amber)">To be Automated</th>
          <th style="color:var(--blue)">Manual</th>
          <th>Coverage</th>
          <th>Progress</th>
        </tr></thead>
        <tbody>
          ${entries.map(([suite, s]) => {
            const pct = s.total > 0 ? Math.round(s.Automated / s.total * 100) : 0
            return `<tr class="suite-row">
              <td><span class="suite-tag">${suite}</span></td>
              <td style="font-family:'JetBrains Mono',monospace">${s.total}</td>
              <td style="color:var(--teal);font-family:'JetBrains Mono',monospace">${s.Automated}</td>
              <td style="color:var(--amber);font-family:'JetBrains Mono',monospace">${s['To be Automated']}</td>
              <td style="color:var(--blue);font-family:'JetBrains Mono',monospace">${s.Manual}</td>
              <td style="font-family:'JetBrains Mono',monospace;color:var(--teal)">${pct}%</td>
              <td style="min-width:120px">
                <div class="progress-bar">
                  <div class="progress-fill" style="background:var(--teal);width:${pct}%"></div>
                </div>
                <div style="font-size:0.7rem;color:var(--muted);margin-top:2px">${pct}% automated</div>
              </td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>
  `
}

function statusBadge(status) {
  const cls = { Automated: 'automated', 'To be Automated': 'to-be-automated', Manual: 'manual' }
  return `<span class="badge ${cls[status] || 'manual'}">${status}</span>`
}

function renderTable() {
  const content = document.getElementById('content')
  content.innerHTML = `
    <div class="table-card">
      <div class="table-head">
        <h3>All Test Cases</h3>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input class="search-input" id="tc-search" placeholder="Search by title or suite…" value="${tableSearch}">
          <div class="filter-tabs">
            ${['All', 'Automated', 'To be Automated', 'Manual'].map(f =>
              `<button class="filter-tab${tableFilter === f ? ' active' : ''}" data-filter="${f}">${f}</button>`
            ).join('')}
          </div>
        </div>
      </div>
      <div id="table-body-wrap"></div>
    </div>
  `
  document.getElementById('tc-search').addEventListener('input', e => {
    tableSearch = e.target.value; tablePage = 1; refreshTableBody()
  })
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      tableFilter = btn.dataset.filter; tablePage = 1; refreshTableBody()
    })
  })
  refreshTableBody()
}

function refreshTableBody() {
  let filtered = appData.filter(tc => {
    const matchFilter = tableFilter === 'All' || tc.automationStatus === tableFilter
    const q = tableSearch.toLowerCase()
    const matchSearch = !q || tc.title.toLowerCase().includes(q) || tc.suite.toLowerCase().includes(q)
    return matchFilter && matchSearch
  })
  filtered.sort((a, b) => {
    const dir = tableSort.dir === 'asc' ? 1 : -1
    if (tableSort.col === 'id') return (a.id - b.id) * dir
    if (tableSort.col === 'title') return a.title.localeCompare(b.title) * dir
    if (tableSort.col === 'suite') return a.suite.localeCompare(b.suite) * dir
    if (tableSort.col === 'status') return a.automationStatus.localeCompare(b.automationStatus) * dir
    return 0
  })
  const total = filtered.length
  const start = (tablePage - 1) * tablePageSize
  const page = filtered.slice(start, start + tablePageSize)
  const totalPages = Math.max(1, Math.ceil(total / tablePageSize))

  const arrow = col => {
    if (tableSort.col !== col) return '<span class="sort-arrow">⇅</span>'
    return `<span class="sort-arrow">${tableSort.dir === 'asc' ? '↑' : '↓'}</span>`
  }
  const sortCls = col => tableSort.col === col ? ' sort-active' : ''

  const wrap = document.getElementById('table-body-wrap')
  if (!wrap) return
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th class="${sortCls('id')}" data-col="id">ID${arrow('id')}</th>
        <th class="${sortCls('title')}" data-col="title">Title${arrow('title')}</th>
        <th class="${sortCls('suite')}" data-col="suite">Suite${arrow('suite')}</th>
        <th class="${sortCls('status')}" data-col="status">Automation Status${arrow('status')}</th>
      </tr></thead>
      <tbody>
        ${page.length === 0 ? `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--muted)">No test cases found</td></tr>` :
          page.map(tc => `<tr>
            <td><a class="tc-id" href="${tc.link}" target="_blank" style="color:var(--muted);text-decoration:none">NDLP-${tc.id}</a></td>
            <td style="max-width:360px"><a href="${tc.link}" target="_blank" style="color:var(--text);text-decoration:none">${tc.title}</a></td>
            <td><span class="suite-tag">${tc.suite}</span></td>
            <td>${statusBadge(tc.automationStatus)}</td>
          </tr>`).join('')
        }
      </tbody>
    </table>
    <div class="pagination">
      <span>${total} test case${total !== 1 ? 's' : ''} · Page ${tablePage} of ${totalPages}</span>
      <div class="pagination-btns">
        <select class="page-size-select" id="page-size">
          ${[10,20,50,100].map(n => `<option value="${n}"${tablePageSize===n?' selected':''}>${n}/page</option>`).join('')}
        </select>
        <button class="pg-btn" id="pg-prev" ${tablePage <= 1 ? 'disabled' : ''}>‹</button>
        <button class="pg-btn" id="pg-next" ${tablePage >= totalPages ? 'disabled' : ''}>›</button>
      </div>
    </div>
  `
  wrap.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col
      if (tableSort.col === col) tableSort.dir = tableSort.dir === 'asc' ? 'desc' : 'asc'
      else { tableSort.col = col; tableSort.dir = 'asc' }
      refreshTableBody()
    })
  })
  wrap.querySelector('#pg-prev')?.addEventListener('click', () => { tablePage--; refreshTableBody() })
  wrap.querySelector('#pg-next')?.addEventListener('click', () => { tablePage++; refreshTableBody() })
  wrap.querySelector('#page-size')?.addEventListener('change', e => {
    tablePageSize = Number(e.target.value); tablePage = 1; refreshTableBody()
  })
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === tableFilter)
  })
}

initAuth()
</script>
</body>
</html>
